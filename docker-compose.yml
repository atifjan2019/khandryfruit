services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: khan_dry_fruit
      POSTGRES_USER: khan
      POSTGRES_PASSWORD: khan_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khan -d khan_dry_fruit"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
